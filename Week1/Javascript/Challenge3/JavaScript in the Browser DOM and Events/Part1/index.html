<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Guess My Number!</h1>

    <button class="again">Again!</button>
    <p class="between">(Between 1 and 20)</p>

    <h2>Secret Number:</h2>
    <div class="number">?</div>

    <hr />

    <h3>Make a guess</h3>
    <input type="number" class="guess" min="1" max="20" />
    <button class="check">Check!</button>

    <p class="message">Start guessing...</p>

    <p>Score: <span class="score">20</span></p>
    <p>HighScore: <span class="highScore">0</span></p>
</body>
 <script>
      const $ = selector => document.querySelector(selector);

      let secretNumber = Math.trunc(Math.random() * 20) + 1;
      let score = 20;
      let highScore = 0;


      const showMessage = msg => {
        $('.message').textContent = msg;
      };

      $('.check').addEventListener('click', function () {
        const guess = Number($('.guess').value);

        if (!guess) {
          showMessage('Sai số');
          return;
        }

        if (guess === secretNumber) {
          showMessage('Đúng số rồi');
          $('.number').textContent = secretNumber;

          $('.number').style.width = '30rem';

          if (score > highScore) {
            highScore = score;
            $('.highScore').textContent = highScore;
          }
        } else {
          if (score > 1) {
            score--;
            showMessage('Sai số rồi');
            $('.score').textContent = score;
          } else {
            showMessage('Hết điểm rồi');
            $('.score').textContent = 0;
          }
        }
      });

      $('.again').addEventListener('click', function () {
        score = 20;
        secretNumber = Math.trunc(Math.random() * 20) + 1;

        showMessage('Start guessing...');
        $('.number').textContent = '?';
        $('.score').textContent = score;
        $('.guess').value = '';

        $('.number').style.width = '10rem';
      });
    </script>
</html>
